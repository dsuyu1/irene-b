id: phishing_credential_theft
title: Phishing → Credential Theft on a Workstation
description: >
  A user clicks a phishing link; PowerShell spawns from Outlook, pulls a payload,
  establishes persistence, and runs Mimikatz to harvest credentials. The analyst
  must investigate before acting, isolate the host, eradicate the stolen
  credentials, and only then recover and report. Several tempting shortcuts are
  dead ends.

start_state: s_alert

scoring:
  optimal_path: [a_triage_edr, a_isolate_host, a_reset_creds, a_write_report]
  report_must_include:
    - phishing
    - Mimikatz
    - svc-backup
    - credential
    - WS-014

states:
  - id: s_alert
    observation: >
      SIEM alert (high): user jdoe clicked a link in an email the mail gateway
      retroactively flagged as malicious. EDR shows powershell.exe spawned from
      OUTLOOK.EXE on workstation WS-014 two minutes ago.
    actions:
      - id: a_triage_edr
        label: Pull the EDR process tree and command line for the PowerShell process.
        kind: investigate
        leads_to: s_edr
        cost: 1
        match_keywords: [edr, process tree, command line, triage, investigate, telemetry, powershell]
      - id: a_reimage_now
        label: Immediately reimage WS-014 to be safe.
        kind: eradicate
        leads_to: s_evidence_lost
        cost: 3
        is_false_lead: true
        match_keywords: [reimage, wipe, rebuild, format]
      - id: a_call_user
        label: Call jdoe to ask what they clicked.
        kind: investigate
        leads_to: s_user_call
        cost: 1
        is_false_lead: true
        match_keywords: [call user, call jdoe, phone, ask the user, interview]

  - id: s_user_call
    observation: >
      jdoe confirms they clicked a "shared invoice" link but can offer no useful
      technical detail. Several minutes lost while the process keeps running.
    actions:
      - id: a_user_back_to_edr
        label: Stop questioning the user and pull the EDR telemetry.
        kind: investigate
        leads_to: s_edr
        cost: 0
        match_keywords: [edr, telemetry, process tree, investigate, logs]

  - id: s_evidence_lost
    observation: >
      WS-014 has been reimaged. Local forensic evidence is destroyed, but EDR
      cloud retention still shows the PowerShell process had beaconed to
      185.220.101.45 and executed a credential-dumping tool before the wipe.
    actions:
      - id: a_isolate_after_reimage
        label: Network-isolate WS-014 and review the retained EDR telemetry.
        kind: contain
        leads_to: s_isolated
        cost: 1
        match_keywords: [isolate, quarantine, contain, network, disconnect]

  - id: s_edr
    observation: >
      The PowerShell command line is base64-encoded; decoded, it downloads a
      payload from 185.220.101.45, installs a scheduled task for persistence, and
      is beaconing every 60s. The process is still live on WS-014.
    actions:
      - id: a_isolate_host
        label: Network-isolate WS-014 via EDR to cut the beacon and contain it.
        kind: contain
        leads_to: s_isolated
        cost: 1
        match_keywords: [isolate, quarantine, contain, network, disconnect, cut off, host]
      - id: a_block_ip
        label: Block 185.220.101.45 at the perimeter firewall and move on.
        kind: contain
        leads_to: s_blocked_ip
        cost: 1
        is_false_lead: true
        match_keywords: [block ip, firewall, perimeter, blackhole, block the address]

  - id: s_blocked_ip
    observation: >
      The C2 IP is blocked at the firewall, but WS-014 is still compromised and
      the attacker simply rotates to a new C2 address. Containment did not hold.
    actions:
      - id: a_isolate_after_block
        label: Network-isolate WS-014 directly via EDR.
        kind: contain
        leads_to: s_isolated
        cost: 1
        match_keywords: [isolate, quarantine, contain, network, disconnect, host]

  - id: s_isolated
    observation: >
      WS-014 is isolated. Memory analysis shows Mimikatz was executed: jdoe's
      cached domain credentials and the token for service account 'svc-backup'
      were harvested. No lateral movement has been observed yet.
    actions:
      - id: a_reset_creds
        label: Rotate jdoe and svc-backup credentials and remove the persistence task.
        kind: eradicate
        leads_to: s_remediated
        cost: 1
        match_keywords: [reset, rotate, credential, password, revoke, remove persistence, scheduled task]
      - id: a_recover_now
        label: Restore WS-014 to normal service right away to reduce downtime.
        kind: recover
        leads_to: s_recover_premature
        cost: 2
        is_false_lead: true
        match_keywords: [restore, recover, bring back online, return to service, reduce downtime]

  - id: s_recover_premature
    observation: >
      You begin restoring WS-014, but the stolen svc-backup credentials are still
      valid across the domain — the attacker could reuse them from anywhere. You
      stop the recovery.
    actions:
      - id: a_reset_after_pause
        label: Rotate the stolen credentials and remove persistence first.
        kind: eradicate
        leads_to: s_remediated
        cost: 1
        match_keywords: [reset, rotate, credential, password, revoke, remove persistence]

  - id: s_remediated
    observation: >
      Credentials for jdoe and svc-backup are rotated, the scheduled-task
      persistence is removed, and firewall blocks are updated. The threat is
      eradicated and there is no evidence of successful lateral movement.
    actions:
      - id: a_write_report
        label: Write the final incident report and close the incident.
        kind: report
        leads_to: s_report
        cost: 1
        match_keywords: [report, write up, document, close the incident, summary, post-incident]

  - id: s_report
    observation: Incident closed.
    terminal: true
